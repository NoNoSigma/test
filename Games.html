    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1b0019;
        }

        /* Container for the grid of buttons, centered with margin */
        .game-library {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 60%; /* Adjust width as needed */
            margin-top: 550px;
        }

        /* Button styling with background images */
        .game-button {
            display: block;
            width: 100%;
            padding-bottom: 100%; /* Creates smaller square buttons */
            position: relative;
            text-align: center;
            color: white;
            font-size: 16px;
            text-decoration: none;
            transition: transform 0.2s ease;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
        }

        /* Hover effect */
        .game-button:hover {
            transform: scale(1.12);
        }

        /* Optional: Add some style to show it's clickable */
        .game-button:active {
            filter: brightness(0.8);
        }

        /* Content inside the button (hidden when using images) */
        .game-button span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; /* Optional: text over the image */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
